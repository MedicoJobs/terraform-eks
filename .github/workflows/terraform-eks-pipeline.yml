name: "Terraform EKS Infrastructure"

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate-and-plan:
    name: "Validate, Scan & Plan"
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Run tfsec Security Scan
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          soft_fail: true

      - name: Run Checkov Infrastructure Scan
        uses: bridgecrewio/checkov-action@master
        with:
          directory: .
          framework: terraform
          soft_fail: true

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate -no-color

      - name: Terraform Plan
        id: plan
        run: terraform plan -out=tfplan -no-color
        
      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: tfplan

  apply-and-verify:
    name: "Apply & Verify Workloads"
    needs: validate-and-plan
    runs-on: ubuntu-latest
    environment: production # Requires manual approval if configured in repo settings
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      issues: write
      actions: write
      contents: read
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Download Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          
      - name: Terraform Init
        run: terraform init

      - name: Wait for Manual Approval
        uses: trstringer/manual-approval@v1
        timeout-minutes: 60
        with:
          secret: ${{ github.token }}
          approvers: PaviTechDeveloper
          minimum-approvals: 1
          issue-title: "Approval Required: Deploy to Production"
          issue-body: "Please approve this deployment to proceed with Terraform Apply."
          exclude-workflow-initiator-as-approver: false

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan

      - name: Update Kubeconfig
        run: aws eks update-kubeconfig --region ap-south-1 --name medicojobs-cluster

      - name: Wait for Pods to be Ready
        run: |
          echo "Waiting for all pods in medicojobs-prod namespace to be ready..."
          kubectl wait --for=condition=Ready pods --all -n medicojobs-prod --timeout=300s
          
      - name: Verify Pods Status
        run: kubectl get pods -n medicojobs-prod
