name: "Destroy Terraform Infrastructure"

on:
  workflow_dispatch: # Allows you to manually trigger this workflow from the GitHub UI
    inputs:
      confirm_destroy:
        description: 'Type "yes" to confirm you want to DESTROY all infrastructure.'
        required: true
        type: string

jobs:
  destroy:
    name: "Destroy Infrastructure"
    runs-on: ubuntu-latest
    
    steps:
      - name: Verify Confirmation
        run: |
          if [ "${{ github.event.inputs.confirm_destroy }}" != "yes" ]; then
            echo "Destruction canceled. You must type 'yes' to proceed."
            exit 1
          fi

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1
          
      - name: Terraform Init
        run: terraform init

      - name: Terraform Destroy
        run: terraform destroy -auto-approve
