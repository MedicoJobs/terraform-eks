apiVersion: apps/v1
kind: Deployment
metadata:
  name: resume-service
  namespace: medicojobs
  labels: &resumeLabels
    app.kubernetes.io/name: resume-service
    app.kubernetes.io/part-of: medicojobs-platform
spec:
  replicas: 2
  revisionHistoryLimit: 5
  selector:
    matchLabels: *resumeLabels
  template:
    metadata:
      labels: *resumeLabels
    spec:
      containers:
        - name: resume-service
          image: 123456789012.dkr.ecr.ap-south-1.amazonaws.com/medicojob-resume-service:latest
          ports:
            - containerPort: 5008
          envFrom:
            - configMapRef:
                name: medicojobs-config
            - secretRef:
                name: medicojobs-secrets
                optional: true
          readinessProbe:
            httpGet:
              path: /health
              port: 5008
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 5008
            initialDelaySeconds: 60
            periodSeconds: 20
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1500m
              memory: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: resume-service
  namespace: medicojobs
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: resume-service
    app.kubernetes.io/part-of: medicojobs-platform
  ports:
    - name: http
      port: 5008
      targetPort: 5008
