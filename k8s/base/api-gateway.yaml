apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: medicojobs
  labels: &apiGatewayLabels
    app.kubernetes.io/name: api-gateway
    app.kubernetes.io/part-of: medicojobs-platform
spec:
  replicas: 2
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels: *apiGatewayLabels
  template:
    metadata:
      labels: *apiGatewayLabels
    spec:
      containers:
        - name: api-gateway
          image: 123456789012.dkr.ecr.ap-south-1.amazonaws.com/medicojob-api-gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: medicojobs-config
            - secretRef:
                name: medicojobs-secrets
                optional: true
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: medicojobs
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: api-gateway
    app.kubernetes.io/part-of: medicojobs-platform
  ports:
    - name: http
      port: 5000
      targetPort: 5000
