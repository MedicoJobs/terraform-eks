apiVersion: apps/v1
kind: Deployment
metadata:
  name: reputation-service
  namespace: medicojobs
  labels: &reputationLabels
    app.kubernetes.io/name: reputation-service
    app.kubernetes.io/part-of: medicojobs-platform
spec:
  replicas: 2
  revisionHistoryLimit: 5
  selector:
    matchLabels: *reputationLabels
  template:
    metadata:
      labels: *reputationLabels
    spec:
      containers:
        - name: reputation-service
          image: 123456789012.dkr.ecr.ap-south-1.amazonaws.com/medicojob-reputation-service:latest
          ports:
            - containerPort: 5006
          envFrom:
            - configMapRef:
                name: medicojobs-config
            - secretRef:
                name: medicojobs-secrets
                optional: true
          readinessProbe:
            tcpSocket:
              port: 5006
          livenessProbe:
            tcpSocket:
              port: 5006
          resources:
            requests:
              cpu: 75m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: reputation-service
  namespace: medicojobs
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: reputation-service
    app.kubernetes.io/part-of: medicojobs-platform
  ports:
    - name: http
      port: 5006
      targetPort: 5006
