apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: aws-alb
spec:
  controllerName: ingress.k8s.aws/alb
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: medicojobs-gateway
  namespace: medicojobs
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:ap-south-1:123456789012:certificate/replace-me
    external-dns.alpha.kubernetes.io/hostname: medicojobs.example.com
spec:
  gatewayClassName: aws-alb
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      hostname: medicojobs.example.com
    - name: https
      protocol: HTTPS
      port: 443
      hostname: medicojobs.example.com
      tls:
        mode: Terminate
        certificateRefs:
          - group: ""
            kind: Secret
            name: unused-with-acm-annotation
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: medicojobs-http-redirect
  namespace: medicojobs
spec:
  parentRefs:
    - name: medicojobs-gateway
      sectionName: http
  hostnames:
    - medicojobs.example.com
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: medicojobs-routes
  namespace: medicojobs
spec:
  parentRefs:
    - name: medicojobs-gateway
      sectionName: https
  hostnames:
    - medicojobs.example.com
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api
        - path:
            type: PathPrefix
            value: /auth
        - path:
            type: PathPrefix
            value: /jobs
        - path:
            type: PathPrefix
            value: /socket.io
      backendRefs:
        - name: api-gateway
          port: 5000
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: frontend
          port: 80
