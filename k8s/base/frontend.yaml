apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: medicojobs
  labels: &frontendLabels
    app.kubernetes.io/name: frontend
    app.kubernetes.io/part-of: medicojobs-platform
spec:
  replicas: 2
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels: *frontendLabels
  template:
    metadata:
      labels: *frontendLabels
    spec:
      containers:
        - name: frontend
          image: 123456789012.dkr.ecr.ap-south-1.amazonaws.com/medicojob-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: medicojobs
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/part-of: medicojobs-platform
  ports:
    - name: http
      port: 80
      targetPort: 80
