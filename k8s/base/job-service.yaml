apiVersion: apps/v1
kind: Deployment
metadata:
  name: job-service
  namespace: medicojobs
  labels: &jobLabels
    app.kubernetes.io/name: job-service
    app.kubernetes.io/part-of: medicojobs-platform
spec:
  replicas: 2
  revisionHistoryLimit: 5
  selector:
    matchLabels: *jobLabels
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels: *jobLabels
    spec:
      containers:
        - name: job-service
          image: 123456789012.dkr.ecr.ap-south-1.amazonaws.com/medicojob-job-service:latest
          ports:
            - containerPort: 5002
          envFrom:
            - configMapRef:
                name: medicojobs-config
            - secretRef:
                name: medicojobs-secrets
                optional: true
          readinessProbe:
            tcpSocket:
              port: 5002
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 5002
            initialDelaySeconds: 45
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 750m
              memory: 768Mi
---
apiVersion: v1
kind: Service
metadata:
  name: job-service
  namespace: medicojobs
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: job-service
    app.kubernetes.io/part-of: medicojobs-platform
  ports:
    - name: http
      port: 5002
      targetPort: 5002
